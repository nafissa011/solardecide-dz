<body>
  <div id="app">
    <div id="splash-screen">
      <div class="splash-content">
        <div class="splash-logo">
          <i class="fas fa-sun"></i>
          <span>SolarDecide <span class="dz">DZ</span></span>
        </div>
        <div class="splash-loader">
          <div class="loader-bar"></div>
        </div>
        <p>Initialisation de la plateforme...</p>
      </div>
    </div>
  </div>

  <script>
    window.BACKEND_URL = (function () {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        return 'http://localhost:5000/api';
      }
      // On Colab: replace with the Cloudflare tunnel URL
      // return 'https://xxxx.trycloudflare.com/api';
      return window.location.origin + '/api';
    })();

    // Set to true to use mock-data.js when the backend is offline
    window.USE_MOCK_FALLBACK = false;
  </script>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
